spec_version: 1
name: promptshield
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: "A real-world OpenEnv environment for detecting prompt injection attacks — the #1 LLM security threat per OWASP 2024."
author: "Nidesh Kaarthik R S"
tags:
  - security
  - nlp
  - prompt-injection
  - llm-safety

tasks:
  - id: task_easy
    difficulty: easy
    description: "Detect direct prompt injection attacks with obvious override language"
    grader:
      type: deterministic
      endpoint: /step
  - id: task_medium
    difficulty: medium
    description: "Detect indirect injections, role-hijacking, and obfuscated attacks"
    grader:
      type: deterministic
      endpoint: /step
  - id: task_hard
    difficulty: hard
    description: "Detect adversarial injections designed to evade classifiers, including encoded attacks and false positives"
    grader:
      type: deterministic
      endpoint: /step

baseline:
  model: "Qwen/Qwen2.5-72B-Instruct"
  script: inference.py
